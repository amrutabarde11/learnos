spring.application.name=LearnOS
server.port=8080

# Local H2 file-based (survives restarts in dev)
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./learnos}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASS:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=${DB_PLATFORM:org.hibernate.dialect.H2Dialect}

# H2 console for local debugging
spring.h2.console.enabled=true

# CORS
spring.web.cors.allowed-origins=*

# Gemini
gemini.api.key=${GEMINI_API_KEY}